<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="források/star_wars.ico" type="image/x-icon">
    <title>Star Wars</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <div class="fejlec">
            <img src="források/star_wars_logo.svg" alt="Star Wars logó" class="logo">
            <p>Réges rég egy messzi galaxisban...</p>
        </div>

        <select id="karakterCsoportok" class="select">
            <option value="">Összes</option>
        </select>

        <div id="tarolo" class="grid">
            
            <div class="card">
                <img src="https://vignette.wikia.nocookie.net/starwars/images/2/20/LukeTLJ.jpg" alt="karakter" class="img">
                <div class="nev">Luke Skywalker</div>
            </div>

            <div class="card">
                <img src="https://vignette.wikia.nocookie.net/starwars/images/3/3f/C-3PO_TLJ_Card_Trader_Award_Card.png" alt="karakter" class="img">
                <div class="nev">C-3PO</div>
            </div>

        </div>

    </main>
    <script src="script.js"></script>
</body>
</html>
